<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab tracker · set new password</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-wrap">
  <h1>Set a new password</h1>
  <div class="sub">Choose a new password for your account</div>
  <div id="msg-box"></div>
  <form id="form-newpw">
    <div class="field"><label>New password (8+ characters)</label><input type="password" id="newpw" minlength="8" required></div>
    <div class="field"><label>Confirm password</label><input type="password" id="newpw2" minlength="8" required></div>
    <button type="submit" class="primary" style="width:100%">Update password</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
function showMsg(text, type) {
  document.getElementById('msg-box').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

// Supabase puts the recovery token in the URL hash and exchanges it for a
// session automatically when the client library loads. We just wait for it.
supabaseClient.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    showMsg('Link verified — enter your new password below.', 'ok');
  }
});

document.getElementById('form-newpw').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw1 = document.getElementById('newpw').value;
  const pw2 = document.getElementById('newpw2').value;
  if (pw1 !== pw2) return showMsg("Passwords don't match.", 'error');

  const { error } = await supabaseClient.auth.updateUser({ password: pw1 });
  if (error) return showMsg(error.message, 'error');
  showMsg('Password updated — redirecting to the dashboard…', 'ok');
  setTimeout(() => window.location.href = 'dashboard.html', 1200);
});
</script>
</body>
</html>
